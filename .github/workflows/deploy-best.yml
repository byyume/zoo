name: Deploy 판교 맛집 앱 to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'best/web/**'
      - '.github/workflows/deploy-best.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: best/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: best/web

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ibjzuowuuearxqzwgedu.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_i5TCeGmsTwLdtez-NIhIjg_3dFtW2hE
        run: npm run build
        working-directory: best/web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: best/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
